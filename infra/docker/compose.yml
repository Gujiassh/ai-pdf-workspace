services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ai-pdf-postgres
    environment:
      POSTGRES_DB: ai_pdf_workspace
      POSTGRES_USER: ai_pdf
      POSTGRES_PASSWORD: ai_pdf_dev
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai-pdf-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data

  minio:
    image: minio/minio:latest
    container_name: ai-pdf-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
