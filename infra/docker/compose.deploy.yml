version: "2.4"

x-python-environment: &python-environment
  AI_PDF_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  AI_PDF_MINIO_ENDPOINT: minio:9000
  AI_PDF_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
  AI_PDF_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  AI_PDF_MINIO_BUCKET: ${MINIO_BUCKET:-ai-pdf-workspace}
  AI_PDF_MINIO_SECURE: "false"
  AI_PDF_API_INTERNAL_TOKEN: ${AI_PDF_API_INTERNAL_TOKEN}
  AI_PDF_EMBEDDING_PROVIDER: ${AI_PDF_EMBEDDING_PROVIDER:-ollama}
  AI_PDF_EMBEDDING_MODEL: ${AI_PDF_EMBEDDING_MODEL:-qwen3-embedding:0.6b}
  AI_PDF_EMBEDDING_VERSION: ${AI_PDF_EMBEDDING_VERSION:-embedding-v1}
  AI_PDF_OLLAMA_BASE_URL: ${AI_PDF_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  AI_PDF_RETRIEVAL_STRATEGY: ${AI_PDF_RETRIEVAL_STRATEGY:-hybrid}
  AI_PDF_RETRIEVAL_CANDIDATE_K: ${AI_PDF_RETRIEVAL_CANDIDATE_K:-10}
  AI_PDF_RETRIEVAL_RRF_CONSTANT: ${AI_PDF_RETRIEVAL_RRF_CONSTANT:-60}
  AI_PDF_WORKER_METRICS_HOST: ${AI_PDF_WORKER_METRICS_HOST:-0.0.0.0}
  AI_PDF_WORKER_METRICS_PORT: ${AI_PDF_WORKER_METRICS_PORT:-9101}
  AI_PDF_GENERATION_PROVIDER: ${AI_PDF_GENERATION_PROVIDER:-openai}
  AI_PDF_GENERATION_MODEL: ${AI_PDF_GENERATION_MODEL:-gpt-5.5}
  AI_PDF_OPENAI_API_KEY: ${AI_PDF_OPENAI_API_KEY}
  AI_PDF_OPENAI_API_BASE: ${AI_PDF_OPENAI_API_BASE:-https://api.openai.com/v1}

services:
  postgres:
    image: pgvector/pgvector:pg17@sha256:dd467f03ca5c5581222490e5217e48a262864ccb659be559f8491bbafdc97da0
    restart: unless-stopped
    stop_grace_period: 5m
    command:
      - postgres
      - -c
      - hnsw.iterative_scan=strict_order
      - -c
      - hnsw.ef_search=400
      - -c
      - hnsw.max_scan_tuples=200000
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: public.ecr.aws/docker/library/redis:7.4.9@sha256:d3be87a1060455213a204d2b0a7f04d45d19a16a98e85b3c37b7c33b5f0c489e
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  migration:
    image: ${AI_PDF_API_IMAGE:-ai-pdf-workspace-api:local}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.python
      target: api
    environment: *python-environment
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: ${AI_PDF_API_IMAGE:-ai-pdf-workspace-api:local}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.python
      target: api
    restart: unless-stopped
    environment: *python-environment
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migration:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  worker:
    image: ${AI_PDF_WORKER_IMAGE:-ai-pdf-workspace-worker:local}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.python
      target: worker
    restart: unless-stopped
    environment: *python-environment
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migration:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    expose:
      - "${AI_PDF_WORKER_METRICS_PORT:-9101}"

  web:
    image: ${AI_PDF_WEB_IMAGE:-ai-pdf-workspace-web:local}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    restart: unless-stopped
    environment:
      AI_PDF_SESSION_SECRET: ${AI_PDF_SESSION_SECRET}
      AI_PDF_API_BASE_URL: http://api:8000
      AI_PDF_API_INTERNAL_TOKEN: ${AI_PDF_API_INTERNAL_TOKEN}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  caddy:
    image: caddy:2.10.2-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
    restart: unless-stopped
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  caddy_config:
  caddy_data:
  postgres_data:
  redis_data:
  minio_data:
