services:
  api:
    build:
      context: /home/cc/code/citeframe
      dockerfile: infra/docker/Dockerfile.python
      target: api
    depends_on:
      migration:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      provider-stub:
        condition: service_healthy
    environment:
      AI_PDF_API_INTERNAL_TOKEN: M403-internal-token-20260721T062811Z
      AI_PDF_DATABASE_URL: postgresql+psycopg://ai_pdf:M403-db-20260721T062811Z@postgres:5432/ai_pdf_workspace
      AI_PDF_EMBEDDING_MODEL: qwen3-embedding:0.6b
      AI_PDF_EMBEDDING_PROVIDER: ollama
      AI_PDF_EMBEDDING_VERSION: embedding-v1
      AI_PDF_GENERATION_MODEL: gpt-5.5
      AI_PDF_GENERATION_PROVIDER: openai
      AI_PDF_MINIO_ACCESS_KEY: m403minio
      AI_PDF_MINIO_BUCKET: ai-pdf-workspace
      AI_PDF_MINIO_ENDPOINT: minio:9000
      AI_PDF_MINIO_SECRET_KEY: M403-minio-20260721T062811Z
      AI_PDF_MINIO_SECURE: "false"
      AI_PDF_OLLAMA_BASE_URL: http://provider-stub:11434
      AI_PDF_OPENAI_API_BASE: https://api.openai.com/v1
      AI_PDF_OPENAI_API_KEY: M403-no-network
      AI_PDF_RETRIEVAL_CANDIDATE_K: '10'
      AI_PDF_RETRIEVAL_RRF_CONSTANT: '60'
      AI_PDF_RETRIEVAL_STRATEGY: hybrid
      AI_PDF_WORKER_METRICS_HOST: 0.0.0.0
      AI_PDF_WORKER_METRICS_PORT: '9101'
    extra_hosts:
      host.docker.internal: host-gateway
    healthcheck:
      interval: 10s
      retries: 12
      start_period: 10s
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready',
        timeout=5)
      timeout: 5s
    image: ai-pdf-workspace-api:m403-20260721T062811Z
    restart: unless-stopped
  caddy:
    depends_on:
      web:
        condition: service_healthy
    environment:
      CADDY_SITE_ADDRESS: :80
    healthcheck:
      interval: 10s
      retries: 12
      start_period: 10s
      test:
      - CMD
      - wget
      - --spider
      - --quiet
      - http://127.0.0.1:2019/config/
      timeout: 5s
    image: caddy:2.10.2-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
    ports:
    - published: 18080
      target: 80
    - published: 18443
      target: 443
    - protocol: udp
      published: 18443
      target: 443
    restart: unless-stopped
    volumes:
    - caddy_config:/config:rw
    - caddy_data:/data:rw
    - /home/cc/code/citeframe/infra/docker/Caddyfile:/etc/caddy/Caddyfile:ro
  migration:
    build:
      context: /home/cc/code/citeframe
      dockerfile: infra/docker/Dockerfile.python
      target: api
    command:
    - alembic
    - upgrade
    - head
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AI_PDF_API_INTERNAL_TOKEN: M403-internal-token-20260721T062811Z
      AI_PDF_DATABASE_URL: postgresql+psycopg://ai_pdf:M403-db-20260721T062811Z@postgres:5432/ai_pdf_workspace
      AI_PDF_EMBEDDING_MODEL: qwen3-embedding:0.6b
      AI_PDF_EMBEDDING_PROVIDER: ollama
      AI_PDF_EMBEDDING_VERSION: embedding-v1
      AI_PDF_GENERATION_MODEL: gpt-5.5
      AI_PDF_GENERATION_PROVIDER: openai
      AI_PDF_MINIO_ACCESS_KEY: m403minio
      AI_PDF_MINIO_BUCKET: ai-pdf-workspace
      AI_PDF_MINIO_ENDPOINT: minio:9000
      AI_PDF_MINIO_SECRET_KEY: M403-minio-20260721T062811Z
      AI_PDF_MINIO_SECURE: "false"
      AI_PDF_OLLAMA_BASE_URL: http://provider-stub:11434
      AI_PDF_OPENAI_API_BASE: https://api.openai.com/v1
      AI_PDF_OPENAI_API_KEY: M403-no-network
      AI_PDF_RETRIEVAL_CANDIDATE_K: '10'
      AI_PDF_RETRIEVAL_RRF_CONSTANT: '60'
      AI_PDF_RETRIEVAL_STRATEGY: hybrid
      AI_PDF_WORKER_METRICS_HOST: 0.0.0.0
      AI_PDF_WORKER_METRICS_PORT: '9101'
    image: ai-pdf-workspace-api:m403-20260721T062811Z
    restart: "no"
  minio:
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_PASSWORD: M403-minio-20260721T062811Z
      MINIO_ROOT_USER: m403minio
    healthcheck:
      interval: 5s
      retries: 20
      start_period: 10s
      test:
      - CMD
      - curl
      - -f
      - http://127.0.0.1:9000/minio/health/live
      timeout: 5s
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    ports:
    - 127.0.0.1:19001:9001/tcp
    restart: unless-stopped
    volumes:
    - minio_data:/data:rw
  postgres:
    command:
    - postgres
    - -c
    - hnsw.iterative_scan=strict_order
    - -c
    - hnsw.ef_search=400
    - -c
    - hnsw.max_scan_tuples=200000
    environment:
      POSTGRES_DB: ai_pdf_workspace
      POSTGRES_PASSWORD: M403-db-20260721T062811Z
      POSTGRES_USER: ai_pdf
    healthcheck:
      interval: 5s
      retries: 20
      start_period: 10s
      test:
      - CMD-SHELL
      - pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      timeout: 5s
    image: pgvector/pgvector:pg17@sha256:dd467f03ca5c5581222490e5217e48a262864ccb659be559f8491bbafdc97da0
    restart: unless-stopped
    stop_grace_period: 5m
    volumes:
    - postgres_data:/var/lib/postgresql/data:rw
  provider-stub:
    command:
    - python
    - scripts/provider_health_stub.py
    healthcheck:
      interval: 5s
      retries: 12
      start_period: 5s
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://127.0.0.1:11434/api/tags',
        timeout=5)
      timeout: 5s
    image: ai-pdf-workspace-api:m403-20260721T062811Z
    restart: unless-stopped
  redis:
    command:
    - redis-server
    - --appendonly
    - "yes"
    healthcheck:
      interval: 5s
      retries: 20
      test:
      - CMD
      - redis-cli
      - ping
      timeout: 3s
    image: public.ecr.aws/docker/library/redis:7.4.9@sha256:d3be87a1060455213a204d2b0a7f04d45d19a16a98e85b3c37b7c33b5f0c489e
    restart: unless-stopped
    volumes:
    - redis_data:/data:rw
  web:
    build:
      context: /home/cc/code/citeframe
      dockerfile: infra/docker/Dockerfile.web
    depends_on:
      api:
        condition: service_healthy
    environment:
      AI_PDF_API_BASE_URL: http://api:8000
      AI_PDF_API_INTERNAL_TOKEN: M403-internal-token-20260721T062811Z
      AI_PDF_SESSION_SECRET: M403-session-secret-20260721T062811Z-long-enough
    healthcheck:
      interval: 10s
      retries: 12
      start_period: 10s
      test:
      - CMD
      - node
      - -e
      - fetch('http://127.0.0.1:3000/').then(r => { if (!r.ok) process.exit(1) }).catch(()
        => process.exit(1))
      timeout: 5s
    image: ai-pdf-workspace-web:m403-20260721T062811Z
    restart: unless-stopped
  worker:
    build:
      context: /home/cc/code/citeframe
      dockerfile: infra/docker/Dockerfile.python
      target: worker
    depends_on:
      migration:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    environment:
      AI_PDF_API_INTERNAL_TOKEN: M403-internal-token-20260721T062811Z
      AI_PDF_DATABASE_URL: postgresql+psycopg://ai_pdf:M403-db-20260721T062811Z@postgres:5432/ai_pdf_workspace
      AI_PDF_EMBEDDING_MODEL: qwen3-embedding:0.6b
      AI_PDF_EMBEDDING_PROVIDER: ollama
      AI_PDF_EMBEDDING_VERSION: embedding-v1
      AI_PDF_GENERATION_MODEL: gpt-5.5
      AI_PDF_GENERATION_PROVIDER: openai
      AI_PDF_MINIO_ACCESS_KEY: m403minio
      AI_PDF_MINIO_BUCKET: ai-pdf-workspace
      AI_PDF_MINIO_ENDPOINT: minio:9000
      AI_PDF_MINIO_SECRET_KEY: M403-minio-20260721T062811Z
      AI_PDF_MINIO_SECURE: "false"
      AI_PDF_OLLAMA_BASE_URL: http://provider-stub:11434
      AI_PDF_OPENAI_API_BASE: https://api.openai.com/v1
      AI_PDF_OPENAI_API_KEY: M403-no-network
      AI_PDF_RETRIEVAL_CANDIDATE_K: '10'
      AI_PDF_RETRIEVAL_RRF_CONSTANT: '60'
      AI_PDF_RETRIEVAL_STRATEGY: hybrid
      AI_PDF_WORKER_METRICS_HOST: 0.0.0.0
      AI_PDF_WORKER_METRICS_PORT: '9101'
    expose:
    - '9101'
    extra_hosts:
      host.docker.internal: host-gateway
    image: ai-pdf-workspace-worker:m403-20260721T062811Z
    restart: unless-stopped
version: '2.4'
volumes:
  caddy_config: {}
  caddy_data: {}
  minio_data: {}
  postgres_data: {}
  redis_data: {}

